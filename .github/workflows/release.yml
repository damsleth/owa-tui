name: Release

on:
  push:
    tags: ["v*"]

jobs:
  gates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Compile
        run: python -m compileall -q src
      - name: Unit tests with coverage
        run: pytest -q --cov --cov-fail-under=85
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: E2E (tui-test, fixture mode)
        run: |
          npm ci
          npx tui-test

  release:
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel + sdist
        run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

# ponytail: PyInstaller standalone binaries deferred (OWA_TUI_PYINSTALLER_READY: false
# in .plans/90-release.md). Add a binaries job + hidden-imports hook when that lands.
# PyPI publish (uv publish) stays manual until a PyPI token secret is wired.
